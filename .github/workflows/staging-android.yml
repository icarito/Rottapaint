name: Staging Android APK

# Construye un APK debug en cada push a main y lo publica en un release
# rolling con el tag "staging". El tag se mueve al último commit en cada
# ejecución, así que la descarga de "staging" siempre es la build más
# reciente. No requiere certificados (gradle firma con el keystore debug).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: staging-android
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Generate native android/ project
        # Las carpetas nativas están en .gitignore; se regeneran en CI.
        run: npx expo prebuild --platform android --no-install

      - name: Build release APK
        working-directory: android
        # assembleRelease produce un APK autónomo (JS empaquetado dentro,
        # arranca sin Metro) y descarta las libs de debug. Lo firmamos con el
        # keystore debug que ya trae el proyecto (apto para probar, no Play
        # Store). Limitamos a arm64-v8a + armeabi-v7a (los x86 son solo
        # emuladores) para reducir el tamaño a la mitad. Kotlin 1.9.25,
        # proguard y shrinkResources los fija expo-build-properties.
        run: ./gradlew assembleRelease --no-daemon -PreactNativeArchitectures=arm64-v8a,armeabi-v7a

      - name: Collect APK
        run: |
          mkdir -p artifacts
          find android/app/build/outputs/apk/release -name '*.apk' \
            -exec cp {} artifacts/rottapaint-staging.apk \;
          ls -la artifacts

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: rottapaint-staging-apk
          path: artifacts/*.apk
          if-no-files-found: error

      - name: Publish to "staging" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: staging
          name: Staging (último build de main)
          prerelease: true
          # Mueve el tag al commit actual en cada ejecución.
          target_commitish: ${{ github.sha }}
          body: |
            APK **release autónomo** (arranca sin Metro) generado automáticamente
            desde el último commit de `main`. Arquitecturas: arm64-v8a + armeabi-v7a.

            - Commit: ${{ github.sha }}
            - Build: ${{ github.run_number }}

            ⚠️ Firmado con el keystore *debug* (apto para probar, no para Play
            Store). Instalá habilitando "orígenes desconocidos" en Android.
          files: artifacts/*.apk
