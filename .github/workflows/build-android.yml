name: Build Android APK

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      build_type:
        description: Tipo de build
        type: choice
        default: release
        options: [release, debug]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Generate native android/ project
        # Las carpetas nativas están en .gitignore; se regeneran en CI.
        run: npx expo prebuild --platform android --no-install

      - name: Decode signing keystore
        # Opcional: si configuras ANDROID_KEYSTORE_BASE64 en Secrets se firma
        # el release. Si no, gradle usa el keystore de debug automáticamente.
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
          {
            echo "MYAPP_UPLOAD_STORE_FILE=release.keystore"
            echo "MYAPP_UPLOAD_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}"
            echo "MYAPP_UPLOAD_STORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}"
            echo "MYAPP_UPLOAD_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}"
          } >> android/gradle.properties

      - name: Build APK
        working-directory: android
        env:
          BUILD_TYPE: ${{ github.event.inputs.build_type || 'release' }}
        run: |
          if [ "$BUILD_TYPE" = "debug" ]; then
            ./gradlew assembleDebug --no-daemon
          else
            ./gradlew assembleRelease --no-daemon
          fi

      - name: Collect APK
        run: |
          mkdir -p artifacts
          find android/app/build/outputs/apk -name '*.apk' -exec cp {} artifacts/ \;
          ls -la artifacts

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: rottapaint-android-apk
          path: artifacts/*.apk
          if-no-files-found: error

      - name: Attach APK to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.apk
