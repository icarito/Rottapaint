name: Deploy web prototype to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permisos que GitHub Pages necesita para publicar desde Actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Un solo deploy a la vez; cancela los antiguos en cola.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Export static web bundle
        # El repo se sirve bajo /<repo>/ en github.io, así que fijamos
        # el base path. app.config.js lee EXPO_PUBLIC_BASE_URL.
        env:
          EXPO_PUBLIC_BASE_URL: /${{ github.event.repository.name }}
        run: npx expo export --platform web

      - name: Add .nojekyll
        # Evita que Pages procese con Jekyll y oculte carpetas como _expo.
        run: touch dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
